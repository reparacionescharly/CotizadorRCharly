<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Cliente - Servicio Técnico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
    /* =========================================
       VARIABLES Y RESET
       ========================================= */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Montserrat', sans-serif;
    }

    body {
        background-color: #050505;
        background-image: 
            radial-gradient(circle at 50% 0%, #1a0000 0%, #050505 60%),
            repeating-linear-gradient(45deg, #000 0%, #000 2px, #050505 2px, #050505 4px);
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem 1rem;
    }

    /* =========================================
       EFECTOS METÁLICOS (TEXTOS)
       ========================================= */
    .text-metal-silver {
        background: linear-gradient(180deg, #f8f9fa 0%, #adb5bd 40%, #495057 50%, #ced4da 60%, #ffffff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-transform: uppercase;
        filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.8));
    }

    .text-metal-red {
        background: linear-gradient(180deg, #ff4d4d 0%, #cc0000 40%, #660000 50%, #b30000 60%, #ff1a1a 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-transform: uppercase;
        filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.8));
    }

    /* =========================================
       CONTENEDORES PRINCIPALES
       ========================================= */
    .header-logo {
        text-align: center;
        margin-bottom: 2rem;
    }

    /* LOGO GRANDE */
    .header-logo img {
        width: 320px;
        max-width: 90vw;
        filter: drop-shadow(0 0 15px rgba(204, 0, 0, 0.5));
    }

    .panel-metal {
        background: linear-gradient(145deg, #1a1a1a 0%, #0d0d0d 100%);
        border: 2px solid #333;
        border-top: 2px solid #555;
        border-left: 2px solid #555;
        border-radius: 15px;
        padding: 2.5rem;
        width: 100%;
        max-width: 500px;
        box-shadow: 
            10px 10px 30px rgba(0, 0, 0, 0.9),
            inset 0 0 20px rgba(0, 0, 0, 0.8),
            0 0 15px rgba(204, 0, 0, 0.1);
        text-align: center;
    }

    /* CONSOLA PEQUEÑA */
    .device-showcase {
        margin: 1.5rem auto;
        width: 120px;
        height: 120px;
        background: radial-gradient(circle, #2a0000 0%, #000 70%);
        border: 1px solid #333;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: inset 0 0 15px rgba(255,0,0,0.2), 0 5px 15px rgba(0,0,0,0.8);
    }

    .device-showcase img {
        width: 85px;
        filter: drop-shadow(0 5px 5px rgba(0,0,0,0.9));
        transition: transform 0.3s ease;
    }

    .device-showcase:hover img {
        transform: scale(1.1);
    }

    /* =========================================
       FORMULARIO Y DESPLEGABLES METÁLICOS
       ========================================= */
    .form-group {
        margin-bottom: 1.5rem;
        text-align: left;
    }

    .form-group label {
        font-size: 0.85rem;
        font-weight: 900;
        letter-spacing: 1px;
        margin-bottom: 0.5rem;
        display: block;
    }

    .metal-dropdown {
        width: 100%;
        padding: 12px 15px;
        font-size: 1rem;
        font-weight: 600;
        color: #e0e0e0;
        background: linear-gradient(to bottom, #262626 0%, #111 100%);
        border: 1px solid #444;
        border-top: 1px solid #666;
        border-radius: 8px;
        appearance: none;
        outline: none;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0,0,0,0.6);
        /* Flecha personalizada metálica */
        background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23adb5bd' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
        background-repeat: no-repeat;
        background-position: right 15px center;
        background-size: 16px;
    }

    .metal-dropdown:focus {
        border-color: #cc0000;
        box-shadow: 0 0 10px rgba(204, 0, 0, 0.4);
    }

    /* =========================================
       BOTONES ROJO/PLATA METÁLICOS
       ========================================= */
    .btn-metal {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        width: 100%;
        padding: 15px;
        margin-top: 1rem;
        font-size: 1.1rem;
        font-weight: 900;
        text-transform: uppercase;
        color: #fff;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        text-decoration: none;
        transition: all 0.3s ease;
    }

    .btn-red {
        background: linear-gradient(to bottom, #ff1a1a 0%, #b30000 50%, #800000 51%, #cc0000 100%);
        border-top: 1px solid #ff6666;
        border-bottom: 2px solid #330000;
        box-shadow: 0 5px 15px rgba(204, 0, 0, 0.3), inset 0 2px 2px rgba(255,255,255,0.2);
        text-shadow: 0 2px 2px rgba(0,0,0,0.6);
    }

    .btn-red:hover {
        background: linear-gradient(to bottom, #ff3333 0%, #cc0000 50%, #990000 51%, #e60000 100%);
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(204, 0, 0, 0.5), inset 0 2px 2px rgba(255,255,255,0.3);
    }

    .btn-red:active {
        transform: translateY(1px);
        box-shadow: 0 2px 5px rgba(204, 0, 0, 0.3);
    }

    /* =========================================
       BOTÓN FLOTANTE WHATSAPP
       ========================================= */
    .float-wa {
        position: fixed;
        bottom: 30px;
        right: 30px;
        width: 65px;
        height: 65px;
        background: linear-gradient(145deg, #1f1f1f, #0a0a0a);
        border: 2px solid #555;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 10px 20px rgba(0,0,0,0.8), 0 0 15px rgba(204,0,0,0.4);
        transition: all 0.3s ease;
        z-index: 1000;
    }

    .float-wa svg {
        width: 35px;
        height: 35px;
        fill: url(#red-metal-grad); /* Usando el gradiente SVG definido abajo */
        filter: drop-shadow(0 2px 2px rgba(0,0,0,0.8));
    }

    .float-wa:hover {
        transform: scale(1.1) rotate(5deg);
        border-color: #cc0000;
        box-shadow: 0 10px 25px rgba(0,0,0,0.9), 0 0 25px rgba(204,0,0,0.6);
    }
</style>
</head>
<body>

    <!-- Definición de gradiente SVG para el ícono de WhatsApp -->
    <svg width="0" height="0" style="position:absolute;">
        <defs>
            <linearGradient id="red-metal-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#ff4d4d" />
                <stop offset="50%" style="stop-color:#b30000" />
                <stop offset="100%" style="stop-color:#ff1a1a" />
            </linearGradient>
        </defs>
    </svg>

    <header class="header-logo">
        <!-- Reemplaza "tu-logo.png" por la ruta de tu logo -->
        <img src="https://via.placeholder.com/320x100/111/adb5bd?text=LOGO+CLIENTE" alt="Logo de la Empresa">
    </header>

    <main class="panel-metal">
        <h1 class="text-metal-silver" style="font-size: 1.8rem; margin-bottom: 5px;">Recepción de Equipos</h1>
        <p class="text-metal-red" style="font-size: 0.9rem; font-weight: 700; margin-bottom: 20px;">Servicio Técnico Especializado</p>

        <!-- Contenedor Pequeño para la Consola -->
        <div class="device-showcase">
            <!-- Reemplaza esta imagen por la de la consola -->
            <img src="https://via.placeholder.com/85/transparent/ff0000?text=IMG" alt="Consola">
        </div>

        <div class="form-group">
            <label class="text-metal-silver">Selecciona tu Dispositivo</label>
            <select class="metal-dropdown" id="dispositivo">
                <option value="ps5">PlayStation 5</option>
                <option value="xbox">Xbox Series X</option>
                <option value="nintendo">Nintendo Switch</option>
            </select>
        </div>

        <div class="form-group">
            <label class="text-metal-silver">Selecciona el Servicio</label>
            <select class="metal-dropdown" id="servicio">
                <option value="mantenimiento">Mantenimiento Preventivo</option>
                <option value="reparacion">Reparación de Hardware</option>
                <option value="diagnostico">Diagnóstico General</option>
            </select>
        </div>

        <!-- Botón de Acción -->
        <button class="btn-metal btn-red" onclick="enviarWhatsApp()">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
            Agendar Servicio
        </button>
    </main>

    <!-- Botón Flotante Metálico -->
    <a href="https://wa.me/527471731852" target="_blank" class="float-wa">
        <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
    </a>

    <script>
        function enviarWhatsApp() {
            const dispositivo = document.getElementById('dispositivo').options[document.getElementById('dispositivo').selectedIndex].text;
            const servicio = document.getElementById('servicio').options[document.getElementById('servicio').selectedIndex].text;
            
            const mensaje = `¡Hola! Me gustaría agendar un servicio.\n\n🎮 *Dispositivo:* ${dispositivo}\n🔧 *Servicio:* ${servicio}`;
            const numero = "527471731852"; 
            
            window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`, '_blank');
        }
    </script>
</body>
</html>
