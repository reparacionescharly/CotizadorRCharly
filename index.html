<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Cliente - Servicio Técnico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
    /* =========================================
       VARIABLES Y RESET
       ========================================= */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Montserrat', sans-serif;
    }

    body {
        background-color: #050505;
        background-image: 
            radial-gradient(circle at 50% 0%, #1a0000 0%, #020202 70%),
            repeating-linear-gradient(45deg, #000 0%, #000 2px, #050505 2px, #050505 4px);
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem 1rem;
        overflow-x: hidden;
    }

    /* =========================================
       EFECTOS METÁLICOS Y NEÓN
       ========================================= */
    .text-metal-silver {
        background: linear-gradient(180deg, #f8f9fa 0%, #adb5bd 40%, #495057 50%, #ced4da 60%, #ffffff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-transform: uppercase;
        filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.8));
    }

    .text-metal-red {
        background: linear-gradient(180deg, #ff4d4d 0%, #cc0000 40%, #660000 50%, #b30000 60%, #ff1a1a 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-transform: uppercase;
    }

    .neon-text-red {
        text-shadow: 0 0 5px rgba(255, 0, 0, 0.8), 0 0 15px rgba(255, 0, 0, 0.6), 0 0 25px rgba(204, 0, 0, 0.4);
    }

    /* =========================================
       HEADER Y LOGO
       ========================================= */
    .header-logo {
        text-align: center;
        margin-bottom: 2rem;
    }

    .header-logo img {
        width: 350px;
        max-width: 90vw;
        filter: drop-shadow(0 0 15px rgba(255, 0, 0, 0.4));
    }

    /* =========================================
       PANEL PRINCIPAL
       ========================================= */
    .panel-metal {
        background: linear-gradient(145deg, #151515 0%, #080808 100%);
        border: 2px solid #550000;
        border-radius: 20px;
        padding: 2.5rem;
        width: 100%;
        max-width: 850px; 
        box-shadow: 
            0 0 20px rgba(255, 0, 0, 0.3),
            inset 0 0 15px rgba(255, 0, 0, 0.1),
            10px 10px 30px rgba(0, 0, 0, 0.9);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
        align-items: center;
    }

    .panel-header {
        grid-column: 1 / -1; 
        text-align: center;
        margin-bottom: 1rem;
        border-bottom: 1px solid rgba(255, 0, 0, 0.2);
        padding-bottom: 15px;
    }

    /* =========================================
       COLUMNA IZQUIERDA
       ========================================= */
    .left-col {
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .device-showcase {
        width: 200px; 
        height: 200px;
        background: radial-gradient(circle, #2a0000 0%, #000 70%);
        border: 2px solid #800000;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 
            0 0 20px rgba(255, 0, 0, 0.6), 
            inset 0 0 20px rgba(255, 0, 0, 0.4),
            0 5px 15px rgba(0,0,0,0.8);
        transition: all 0.4s ease;
    }

    .device-showcase:hover {
        border-color: #ff1a1a;
        box-shadow: 
            0 0 35px rgba(255, 0, 0, 0.8), 
            inset 0 0 25px rgba(255, 0, 0, 0.6);
    }

    .device-showcase img {
        width: 140px; 
        filter: drop-shadow(0 10px 10px rgba(0,0,0,0.9));
        transition: transform 0.4s ease, opacity 0.3s ease;
    }

    .device-showcase:hover img {
        transform: scale(1.15) translateY(-5px);
    }

    /* =========================================
       COLUMNA DERECHA
       ========================================= */
    .right-col {
        display: flex;
        flex-direction: column;
        gap: 15px; /* Reducido ligeramente para acomodar 3 campos */
    }

    .form-group {
        text-align: left;
    }

    .form-group label {
        font-size: 0.85rem;
        font-weight: 900;
        letter-spacing: 1.5px;
        margin-bottom: 0.6rem;
        display: block;
    }

    .metal-dropdown {
        width: 100%;
        padding: 14px 18px;
        font-size: 0.95rem;
        font-weight: 600;
        color: #e0e0e0;
        background: linear-gradient(to bottom, #262626 0%, #111 100%);
        border: 1px solid #444;
        border-left: 3px solid #cc0000; 
        border-radius: 8px;
        appearance: none;
        outline: none;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0,0,0,0.6);
        background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ff4d4d' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
        background-repeat: no-repeat;
        background-position: right 15px center;
        background-size: 16px;
        transition: all 0.3s ease;
    }

    .metal-dropdown:focus, .metal-dropdown:hover {
        border-color: #ff1a1a;
        box-shadow: 0 0 15px rgba(255, 0, 0, 0.5), inset 0 0 5px rgba(255,0,0,0.2);
    }

    .precio-container {
        text-align: center;
        margin-top: 5px;
        background: rgba(0,0,0,0.5);
        border-radius: 8px;
        padding: 15px;
        border: 1px solid rgba(255, 0, 0, 0.2);
    }

    /* =========================================
       BOTÓN FLOTANTE WHATSAPP
       ========================================= */
    .float-wa {
        position: fixed;
        bottom: 35px;
        right: 35px;
        width: 70px;
        height: 70px;
        background: linear-gradient(145deg, #1f1f1f, #050505);
        border: 2px solid #cc0000;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 0 20px rgba(255,0,0,0.6), 0 10px 20px rgba(0,0,0,0.8);
        transition: all 0.3s ease;
        z-index: 1000;
        cursor: pointer;
        text-decoration: none;
    }

    .float-wa svg {
        width: 38px;
        height: 38px;
        fill: url(#red-metal-grad); 
        filter: drop-shadow(0 2px 3px rgba(0,0,0,0.9));
        transition: all 0.3s ease;
    }

    .float-wa:hover {
        transform: scale(1.1) rotate(10deg);
        border-color: #ff1a1a;
        box-shadow: 0 0 35px rgba(255,0,0,0.9), 0 10px 25px rgba(0,0,0,0.9);
    }

    /* =========================================
       RESPONSIVO
       ========================================= */
    @media(max-width: 700px) {
        .panel-metal { grid-template-columns: 1fr; gap: 20px; }
        .device-showcase { width: 160px; height: 160px; margin: auto; }
        .device-showcase img { width: 110px; }
        .float-wa { bottom: 25px; right: 25px; width: 60px; height: 60px; }
        .float-wa svg { width: 32px; height: 32px; }
    }
</style>
</head>

        </div>
