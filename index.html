<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotizador - Consolas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
    /* =========================================
       VARIABLES Y RESET
       ========================================= */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Montserrat', sans-serif;
    }

    body {
        background-color: #050505;
        background-image: 
            radial-gradient(circle at 50% 0%, #1a0000 0%, #020202 70%),
            repeating-linear-gradient(45deg, #000 0%, #000 2px, #050505 2px, #050505 4px);
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem 1rem;
        overflow-x: hidden;
    }

    .text-metal-silver {
        background: linear-gradient(180deg, #f8f9fa 0%, #adb5bd 40%, #495057 50%, #ced4da 60%, #ffffff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-transform: uppercase;
        filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.8));
    }

    .text-metal-red {
        background: linear-gradient(180deg, #ff4d4d 0%, #cc0000 40%, #660000 50%, #b30000 60%, #ff1a1a 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-transform: uppercase;
    }

    .neon-text-red {
        text-shadow: 0 0 5px rgba(255, 0, 0, 0.8), 0 0 15px rgba(255, 0, 0, 0.6), 0 0 25px rgba(204, 0, 0, 0.4);
    }

    /* =========================================
       HEADER Y LOGO ANIMADO
       ========================================= */
    .header-logo {
        text-align: center;
        margin-bottom: 2rem;
    }

    .header-logo img, .header-logo video {
        width: 350px;
        max-width: 90vw;
        filter: drop-shadow(0 0 15px rgba(255, 0, 0, 0.4));
        border-radius: 15px; 
        pointer-events: none; /* Evita que el cliente lo pause sin querer */
    }

    /* =========================================
       PANEL PRINCIPAL
       ========================================= */
    .panel-metal {
        background: linear-gradient(145deg, #151515 0%, #080808 100%);
        border: 2px solid #550000;
        border-radius: 20px;
        padding: 2.5rem;
        width: 100%;
        max-width: 850px; 
        box-shadow: 
            0 0 20px rgba(255, 0, 0, 0.3),
            inset 0 0 15px rgba(255, 0, 0, 0.1),
            10px 10px 30px rgba(0, 0, 0, 0.9);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
        align-items: center;
    }

    .panel-header {
        grid-column: 1 / -1; 
        text-align: center;
        margin-bottom: 1rem;
        border-bottom: 1px solid rgba(255, 0, 0, 0.2);
        padding-bottom: 15px;
    }

    .left-col {
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .console-img {
        width: 250px;
        max-width: 100%;
        transition: transform 0.4s ease, filter 0.4s ease, opacity 0.3s ease;
        filter: drop-shadow(0 15px 20px rgba(0,0,0,0.9)) drop-shadow(0 0 25px rgba(255, 0, 0, 0.6));
    }

    .console-img:hover {
        transform: scale(1.1) translateY(-10px);
        filter: drop-shadow(0 25px 25px rgba(0,0,0,0.9)) drop-shadow(0 0 40px rgba(255, 0, 0, 0.9));
    }

    .right-col {
        display: flex;
        flex-direction: column;
        gap: 15px; 
    }

    .form-group {
        text-align: left;
    }

    .form-group label {
        font-size: 0.85rem;
        font-weight: 900;
        letter-spacing: 1.5px;
        margin-bottom: 0.8rem;
        display: block;
    }

    .metal-dropdown {
        width: 100%;
        padding: 14px 18px;
        font-size: 0.95rem;
        font-weight: 600;
        color: #e0e0e0;
        background: linear-gradient(to bottom, #262626 0%, #111 100%);
        border: 1px solid #444;
        border-left: 3px solid #cc0000; 
        border-radius: 8px;
        appearance: none;
        outline: none;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0,0,0,0.6);
        background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ff4d4d' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
        background-repeat: no-repeat;
        background-position: right 15px center;
        background-size: 16px;
        transition: all 0.3s ease;
    }

    .metal-dropdown:focus, .metal-dropdown:hover {
        border-color: #ff1a1a;
        box-shadow: 0 0 15px rgba(255, 0, 0, 0.5), inset 0 0 5px rgba(255,0,0,0.2);
    }

    .metal-text-input {
        width:100%;
        padding:14px 18px;
        font-size:.95rem;
        font-weight:600;
        color:#e0e0e0;
        background:linear-gradient(to bottom,#262626 0%,#111 100%);
        border:1px solid #444;
        border-left:3px solid #cc0000;
        border-radius:8px;
        outline:none;
        box-shadow:0 4px 6px rgba(0,0,0,.6);
        transition:.3s;
        font-family:'Montserrat',sans-serif;
    }
    .metal-text-input:focus,.metal-text-input:hover{
        border-color:#ff1a1a;
        box-shadow:0 0 15px rgba(255,0,0,.5), inset 0 0 5px rgba(255,0,0,.2);
    }
    .metal-text-input::placeholder{color:#777;}
    textarea.metal-text-input{resize:vertical;min-height:80px;}

    .precio-container {
        text-align: center;
        margin-top: 5px;
        background: rgba(0,0,0,0.5);
        border-radius: 8px;
        padding: 15px;
        border: 1px solid rgba(255, 0, 0, 0.2);
    }

    /* =========================================
       BOTONES DE ACCIÓN (WA + SECUNDARIOS)
       ========================================= */
    .action-buttons {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .btn-wa {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, #1a0000, #000000);
        border: 2px solid #cc0000;
        border-radius: 10px;
        color: #fff;
        font-size: 1rem;
        font-weight: 800;
        text-transform: uppercase;
        cursor: pointer;
        box-shadow: 0 0 15px rgba(255,0,0,0.3), 0 5px 15px rgba(0,0,0,0.8);
        transition: all 0.3s ease;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
    }

    .btn-wa svg {
        width: 24px;
        height: 24px;
        fill: url(#red-metal-grad);
        transition: all 0.3s ease;
    }

    .btn-wa:hover {
        border-color: #ff1a1a;
        box-shadow: 0 0 25px rgba(255,0,0,0.7), 0 10px 20px rgba(0,0,0,0.8);
        transform: translateY(-3px);
    }
    
    .btn-wa:hover svg {
        transform: scale(1.1) rotate(10deg);
    }

    .btn-secondary {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #111, #050505);
        border: 1px solid #444;
        border-radius: 10px;
        color: #ccc;
        font-size: 0.85rem;
        font-weight: 700;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
    }

    .btn-secondary:hover {
        border-color: #ff4d4d;
        color: #fff;
        box-shadow: 0 0 15px rgba(255,0,0,0.3);
        transform: translateY(-2px);
    }

    /* =========================================
       SECCIÓN DE REDES, UBICACIÓN Y PAGOS
       ========================================= */
    .info-panel {
        background: linear-gradient(145deg, #121212 0%, #050505 100%);
        border: 1px solid #330000;
        border-radius: 15px;
        padding: 20px;
        width: 100%;
        max-width: 850px;
        margin-top: 30px;
        box-shadow: 0 0 20px rgba(0,0,0,0.9);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }

    .info-card {
        background: rgba(0,0,0,0.6);
        border: 1px solid #2a0000;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
        transition: all 0.3s ease;
    }

    .info-card:hover {
        border-color: #550000;
        box-shadow: inset 0 0 15px rgba(255,0,0,0.05);
    }

    .info-card h3 { 
        color: #ff4d4d; 
        font-size: 0.95rem; 
        margin-bottom: 12px; 
        text-transform: uppercase; 
        letter-spacing: 1px;
    }

    .info-card p, .info-card a { 
        color: #cccccc; 
        font-size: 0.85rem; 
        text-decoration: none; 
        display: block; 
        margin-bottom: 6px;
        line-height: 1.4;
    }

    .info-card a:hover { 
        color: #ffffff; 
        text-shadow: 0 0 8px rgba(255,26,26,0.8); 
    }

    .social-links { 
        display: flex; 
        justify-content: center; 
        gap: 20px; 
        margin-top: 15px; 
    }

    .social-links a {
        font-size: 1rem;
        font-weight: 700;
        color: #ff4d4d;
        border-bottom: 1px solid transparent;
        padding-bottom: 2px;
    }

    .social-links a:hover {
        color: #fff;
        border-bottom: 1px solid #ff1a1a;
    }

    .pago-numero {
        font-size: 1.1rem !important;
        font-weight: bold;
        color: #fff !important;
        letter-spacing: 2px;
        margin: 10px 0 !important;
    }

    @media(max-width: 700px) {
        .panel-metal, .info-panel { grid-template-columns: 1fr; gap: 20px; padding: 1.5rem; }
        .console-img { width: 180px; }
    }
</style>
</head>
<body>

    <svg width="0" height="0" style="position:absolute;">
        <defs>
            <linearGradient id="red-metal-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#ff4d4d" />
                <stop offset="50%" style="stop-color:#b30000" />
                <stop offset="100%" style="stop-color:#ff1a1a" />
            </linearGradient>
        </defs>
    </svg>

    <header class="header-logo">
        <video autoplay loop muted playsinline>
            <source src="logo-animado.mp4" type="video/mp4">
        </video>
    </header>

    <main class="panel-metal">
        <div class="panel-header">
            <h1 class="text-metal-silver" style="font-size: 1.1rem; margin-bottom: 5px;">Recepción de Equipos</h1>
            <p class="text-metal-red neon-text-red" style="font-size: 1rem; font-weight: 700;">Servicio Técnico de Consolas</p>
        </div>

        <div class="left-col">
            <img id="deviceImg" class="console-img" src="xbox-one.png" alt="Consola">
        </div>

        <div class="right-col">
            <div class="form-group">
                <label class="text-metal-silver">1. Tu Consola</label>
                <!-- Atributo onchange original restaurado -->
                <select class="metal-dropdown" id="dispositivo" onchange="cargarServicios()">
                </select>
            </div>

            <div class="form-group">
                <label class="text-metal-silver">2. Tipo de Servicio</label>
                <!-- Atributo onchange original restaurado -->
                <select class="metal-dropdown" id="servicio" onchange="calcularPrecio()">
                </select>
            </div>


            <div class="form-group">
                <label class="text-metal-silver">Nombre del Cliente</label>
                <input type="text" id="nombreCliente" class="metal-text-input" placeholder="Ej. Juan Pérez">
            </div>

            <div class="form-group">
                <label class="text-metal-silver">Descripción de la falla</label>
                <textarea id="fallaEquipo" class="metal-text-input" placeholder="Describe brevemente la falla del equipo..."></textarea>
            </div>

            <div class="precio-container">
                <label class="text-metal-silver" style="font-size: 0.75rem;">Costo Estimado</label>
                <p class="text-metal-red neon-text-red" style="font-size: 1.8rem; font-weight: 900; margin-top: 5px;" id="precioDisplay">$0</p>
            </div>

            <div class="action-buttons">
                <!-- BOTÓN ENVIAR COTIZACIÓN WHATSAPP -->
                <button class="btn-wa" onclick="enviarWhatsApp(event)">
                    <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
                    Enviar Cotización
                </button>
                
                <!-- BOTONES SECUNDARIOS -->
                <button class="btn-secondary" onclick="window.open('https://reparacionescharly.github.io/Cotizadorcontroles-/', '_self')">
                    🕹️ Cotizador de Controles
                </button>
                <button class="btn-secondary" onclick="window.open('tester.html', '_self')">
                    🎮 Tester de Controles
                </button>
            </div>
        </div>
    </main>

    <div class="info-panel">
        <div class="info-card">
            <h3>📍 Contáctanos</h3>
            <a href="https://maps.app.goo.gl/qxCagrwpNnx39w6V8?g_st=ac" target="_blank">Ver Ubicación en Mapa</a>
            <div class="social-links">
                <a href="https://www.facebook.com/share/1EQq6NiLzx/" target="_blank">Facebook</a>
                <a href="https://www.instagram.com/reparacionescharlyb9?igsh=MXc5d3p0OWVjcDJ2OQ==" target="_blank">Instagram</a>
            </div>
        </div>

        <div class="info-card">
            <h3>💳 Métodos de Pago</h3>
            <p>Aceptamos Mercado Pago</p>
            <p class="pago-numero">722969020254155883</p>
            <p>Carlos Francisco Romero Romero</p>
        </div>
    </div>

    <!-- SCRIPT ORIGINAL RESTAURADO CON TUS CONSOLAS -->
    <script>
        const data = {
            "Retro": [["Revisión / Diagnóstico", "Gratis"], ["Mantenimiento", 400], ["Cambio de componentes", 600]],
            "Portátiles": [["Revisión / Diagnóstico", "Gratis"], ["Mantenimiento", 400], ["Cambio de componentes", 600]],
            "PlayStation 3 (PS3)": [["Revisión / Diagnóstico", "Gratis"], ["Mantenimiento", 400], ["HDMI", 650], ["Hack", 800], ["ICE video", 750], ["Ventilador", 350]],
            "Xbox 360": [["Revisión / Diagnóstico", "Gratis"], ["Mantenimiento", 400], ["HDMI", 650], ["Chip 100 juegos", 1500], ["ICE video", 750], ["Ventilador", 350], ["Flexor de frente", 350]],
            "Xbox One": [["Revisión / Diagnóstico", "Gratis"], ["Mantenimiento", 400], ["Panel frontal", 400], ["MOSFET", 750], ["Realtek", 800], ["HDMI", 750], ["Cambio ventilador", 400], ["Cambio módulo inalámbrico", 400], ["Filtros o ESD", 900], ["IC Power", 1000]],
            "Xbox One S": [["Revisión / Diagnóstico", "Gratis"], ["Mantenimiento", 400], ["Ventilador", 450], ["Panel frontal", 400], ["HDMI", 800], ["Módulo inalámbrico", 500], ["MOSFET", 1000], ["Realtek", 1000], ["Filtros", 600], ["ESD", 1200], ["IC Power", 1200], ["Retimer", 1000], ["Carcasa", 800]],
            "Xbox Series S": [["Revisión / Diagnóstico", "Gratis"], ["Mantenimiento", 500], ["HDMI", 1000], ["Cambio fuente", 1300], ["Ventilador", 1300], ["Bluetooth", 800], ["WiFi", 900], ["Retimer", 1500], ["Ethernet", 1200], ["RAM/APU", 2000], ["MOSFET", 1500], ["Fuente", 900]],
            "Xbox Series X": [["Revisión / Diagnóstico", "Gratis"], ["Mantenimiento", 700], ["HDMI", 1500], ["Bluetooth", 1000], ["WiFi", 1000], ["Retimer", 1800], ["Ethernet", 1500], ["RAM/APU", 2600], ["MOSFET", 1800], ["Fuente", 1200], ["Cambio fuente", 1500], ["Ventilador", 1400]],
            "PlayStation 4 (PS4)": [["Revisión / Diagnóstico", "Gratis"], ["Mantenimiento", 400], ["Disco 1TB", 1500], ["Disco 500GB", 1000], ["HDMI", 800], ["Lectora", 800], ["Encoder", 1100]],
            "PlayStation 4 Pro (PS4 Pro)": [["Revisión / Diagnóstico", "Gratis"], ["Mantenimiento", 450], ["Disco 1TB", 1500], ["Disco 500GB", 1000], ["HDMI", 900], ["Lectora", 900], ["Encoder", 1100]],
            "PlayStation 5 (PS5)": [["Revisión / Diagnóstico", "Gratis"], ["Mantenimiento", 1200], ["HDMI", 1200], ["Encoder", 1500], ["Fuente", 1200], ["Cambio fuente", 1800], ["Southbridge", 2500], ["IC/Fusible", 2000]],
            "Nintendo Switch": [["Revisión / Diagnóstico", "Gratis"], ["Mantenimiento", 400], ["Batería", 800], ["CHIP 128GB 15 JUEGOS", 1500], ["CHIP 256GB 30 JUEGOS", 1900], ["CHIP 512GB 50 JUEGOS", 2600], ["SOLO CHIP SIN NADA", 900], ["Puerto de Carga", 800], ["Cambio de Pantalla", 1500], ["Joy-Con Drift", 250]]
        };

        const imagenes = {
            "Retro": "retro.png",
            "Portátiles": "portatiles.png",
            "PlayStation 3 (PS3)": "ps3.png",
            "Xbox 360": "xbox360.png",
            "Xbox One": "xbox-one.png",
            "Xbox One S": "xbox-one-s.png",
            "Xbox Series S": "xbox-series-s.png",
            "Xbox Series X": "xbox-series-x.png",
            "PlayStation 4 (PS4)": "ps4.png",
            "PlayStation 4 Pro (PS4 Pro)": "ps4-pro.png",
            "PlayStation 5 (PS5)": "ps5.png",
            "Nintendo Switch": "switch.png"
        }; 

        let cbDispositivo = document.getElementById("dispositivo");
        let cbServicio = document.getElementById("servicio");
        let imgDisplay = document.getElementById("deviceImg");
        let precioDisplay = document.getElementById("precioDisplay");

        let opciones = Object.keys(data);
        for(let i = 0; i < opciones.length; i++) {
            let op = document.createElement("option");
            op.value = opciones[i];
            op.textContent = opciones[i];
            cbDispositivo.appendChild(op);
        }
        cbDispositivo.selectedIndex = 0; 

        function cargarServicios() {
            let disp = cbDispositivo.value;

            imgDisplay.style.opacity = 0;
            setTimeout(() => {
                imgDisplay.src = imagenes[disp] || "xbox-one.png"; 
                imgDisplay.style.opacity = 1;
            }, 150);

            cbServicio.innerHTML = "";
            let servicios = data[disp];
            
            for (let i = 0; i < servicios.length; i++) {
                let op = document.createElement("option");
                op.value = servicios[i][0];
                op.textContent = servicios[i][0];
                cbServicio.appendChild(op);
            }
            
            cbServicio.selectedIndex = 0;
            calcularPrecio();
        }

        function calcularPrecio() {
            let disp = cbDispositivo.value;
            let srv = cbServicio.value;
            
            let servicioData = data[disp].find(s => s[0] === srv);
            
            if (servicioData) {
                let precio = servicioData[1];
                if (precio === "Gratis") {
                    precioDisplay.innerText = "Gratis";
                } else {
                    precioDisplay.innerText = "$" + precio;
                }
            }
        }

        function enviarWhatsApp(e) {
            e.preventDefault(); 
            
            const dispositivo = cbDispositivo.value;
            const servicio = cbServicio.value;
            const precio = precioDisplay.innerText;
            
            const mensaje = `🎮 REPARACIONES CHARLY\n\n¡Hola! Me gustaría agendar un servicio desde la página web.\n\n🕹 *Consola:* ${dispositivo}\n🔧 *Servicio:* ${servicio}\n💰 *Costo Estimado:* ${precio}`;
            const numero = "523324114355"; 
            
            window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`, '_blank');
        }

        cargarServicios();
    </script>
</body>
</html>
